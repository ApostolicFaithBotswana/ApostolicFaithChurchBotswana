<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Camp Admin Login · AFC Botswana</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../camp-shared.css"/>
<style>
body {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: radial-gradient(circle at top, #111a2e, #070b14);
  padding: 20px;
}

.login-box {
  width: 100%;
  max-width: 440px;
  background: rgba(255,255,255,.05);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 18px;
  padding: 2.5rem;
  backdrop-filter: blur(20px);
}

.login-logo { text-align: center; margin-bottom: 1.25rem; }
.login-logo img { height: 58px; }

.login-title {
  font-family: 'Playfair Display', serif;
  text-align: center;
  font-size: 1.45rem;
  margin-bottom: .25rem;
}
.login-sub {
  text-align: center;
  color: var(--c-muted);
  font-size: .82rem;
  margin-bottom: 1.75rem;
}

/* ── ROLE SELECTOR ── */
.role-selector { display: flex; flex-direction: column; gap: .5rem; margin-bottom: 1.5rem; }

.role-btn {
  display: flex;
  align-items: center;
  gap: .85rem;
  padding: .8rem 1rem;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,.1);
  background: transparent;
  color: white;
  cursor: pointer;
  transition: all .2s;
  font-family: 'Lato', sans-serif;
  text-align: left;
  width: 100%;
}
.role-btn:hover { background: rgba(255,255,255,.05); border-color: rgba(255,255,255,.2); }
.role-btn.active {
  border-color: var(--c-gold);
  color: var(--c-gold);
  background: rgba(212,175,55,.1);
}
.role-icon { font-size: 1.35rem; flex-shrink: 0; }
.role-info strong { display: block; font-size: .87rem; font-weight: 900; }
.role-info small  { color: var(--c-muted); font-size: .73rem; }
.role-btn.active .role-info small { color: rgba(212,175,55,.65); }

/* ── MESSAGES ── */
.msg {
  display: none;
  margin-bottom: 1rem;
  padding: .8rem 1rem;
  border-radius: 8px;
  font-size: .83rem;
  line-height: 1.5;
}
.msg-error   { background: rgba(224,82,82,.15);  color: #ff8080; border: 1px solid rgba(224,82,82,.2); }
.msg-success { background: rgba(46,204,113,.12); color: #2ecc71; border: 1px solid rgba(46,204,113,.2); }

/* ── FIELDS ── */
.field-group { margin-bottom: 1rem; }
.field-group label {
  display: block;
  font-size: .73rem;
  font-weight: 700;
  color: var(--c-muted);
  text-transform: uppercase;
  letter-spacing: .08em;
  margin-bottom: .4rem;
}
.field-group input {
  width: 100%;
  padding: .75rem 1rem;
  border-radius: 9px;
  border: 1px solid rgba(255,255,255,.12);
  background: rgba(255,255,255,.06);
  color: white;
  font-family: 'Lato', sans-serif;
  font-size: .9rem;
  outline: none;
  transition: border-color .2s;
}
.field-group input:focus { border-color: var(--c-gold); }
.field-group input::placeholder { color: rgba(255,255,255,.22); }

/* ── FORGOT LINK ── */
.forgot-link {
  display: block;
  text-align: right;
  font-size: .76rem;
  color: var(--c-muted);
  cursor: pointer;
  margin-top: -.3rem;
  margin-bottom: 1.1rem;
  transition: color .2s;
  background: none;
  border: none;
  font-family: 'Lato', sans-serif;
  padding: 0;
}
.forgot-link:hover { color: var(--c-gold); }

/* ── LOGIN BTN ── */
.login-submit {
  width: 100%;
  padding: .9rem;
  border: none;
  border-radius: 10px;
  background: linear-gradient(135deg, var(--c-gold), var(--c-gold2));
  color: #081225;
  font-family: 'Lato', sans-serif;
  font-weight: 900;
  font-size: .95rem;
  cursor: pointer;
  transition: all .2s;
  margin-bottom: 1rem;
}
.login-submit:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(212,175,55,.3); }
.login-submit:disabled { opacity: .5; cursor: not-allowed; transform: none; box-shadow: none; }

.divider { border: none; border-top: 1px solid rgba(255,255,255,.07); margin: 1.1rem 0; }

.back-link {
  display: block;
  text-align: center;
  color: var(--c-muted);
  font-size: .82rem;
  text-decoration: none;
  transition: color .2s;
}
.back-link:hover { color: white; }

/* ── MOBILE ── */
@media (max-width: 480px) {
  .login-box { padding: 1.75rem 1.25rem; }
  .login-title { font-size: 1.25rem; }
}
</style>
</head>
<body>

<div class="login-box">

  <div class="login-logo">
    
<img src="../../css/images/logo1.png" alt="AFC Botswana"/>
  </div>

  <h2 class="login-title">Camp Admin Login</h2>
  <p class="login-sub">Camp Meeting 2026 · AFC Botswana</p>

  <!-- ROLE SELECTOR -->
  <div class="role-selector">
    <button class="role-btn active" id="rb-manager" onclick="selectRole('manager')">
      <span class="role-icon">🏕️</span>
      <div class="role-info">
        <strong>Camp Manager</strong>
        <small>Full system access</small>
      </div>
    </button>
    <button class="role-btn" id="rb-store" onclick="selectRole('store')">
      <span class="role-icon">👕</span>
      <div class="role-info">
        <strong>Store Manager</strong>
        <small>Products &amp; orders</small>
      </div>
    </button>
    <button class="role-btn" id="rb-secretary" onclick="selectRole('secretary')">
      <span class="role-icon">📋</span>
      <div class="role-info">
        <strong>Secretary</strong>
        <small>Attendance &amp; records</small>
      </div>
    </button>
  </div>

  <!-- MESSAGES -->
  <div id="msgError"   class="msg msg-error"></div>
  <div id="msgSuccess" class="msg msg-success"></div>

  <!-- EMAIL -->
  <div class="field-group">
    <label>Email Address</label>
    <input type="email" id="loginEmail" placeholder="Enter your email"
      onkeydown="if(event.key==='Enter') doLogin()"/>
  </div>

  <!-- PASSWORD -->
  <div class="field-group">
    <label>Password</label>
    <input type="password" id="loginPwd" placeholder="Enter your password"
      onkeydown="if(event.key==='Enter') doLogin()"/>
  </div>

  <!-- FORGOT PASSWORD -->
  <button class="forgot-link" onclick="doForgotPassword()">Forgot password?</button>

  <!-- LOGIN -->
  <button class="login-submit" id="loginBtn" onclick="doLogin()">Login →</button>

  <hr class="divider"/>

  <a href="../index.html" class="back-link">← Back to Camp Portal</a>

</div>

<script type="module">
import {
  auth,
  signInWithEmailAndPassword,
  signOut,
  sendPasswordResetEmail,
  ROLE_EMAILS
} from '../camp-firebase.js';

let currentRole = 'manager';

// ── ROLE SELECTION ──
window.selectRole = function(role) {
  currentRole = role;
  document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('rb-' + role).classList.add('active');
  clearMessages();
  // Pre-fill email hint
  document.getElementById('loginEmail').placeholder = ROLE_EMAILS[role] || 'Enter your email';
};

// ── LOGIN ──
window.doLogin = async function() {
  const btn   = document.getElementById('loginBtn');
  const email = document.getElementById('loginEmail').value.trim();
  const pwd   = document.getElementById('loginPwd').value;
  clearMessages();

  if(!email || !pwd) {
    showError('Please enter your email address and password.');
    return;
  }

  btn.disabled    = true;
  btn.textContent = 'Logging in…';

  try {
    const cred      = await signInWithEmailAndPassword(auth, email, pwd);
    const userEmail = cred.user.email.toLowerCase();

    // ── ROUTE BY EMAIL ──
    // When two roles share an email, use the selected role button to decide
const allowedEmails = Object.values(ROLE_EMAILS);
if(!allowedEmails.includes(userEmail)) {
  await signOut(auth);
  showError('Your account does not have access to this portal.');
  return;
}

// Route based on which role button was selected
sessionStorage.setItem('campAdminRole', currentRole);

if(currentRole === 'manager') {
  window.location.href = 'manager.html';
} else if(currentRole === 'store') {
  window.location.href = 'store-manager.html';
} else if(currentRole === 'secretary') {
  window.location.href = 'secretary.html';
} else {
  await signOut(auth);
  showError('Unknown role selected.');
}
  } catch(err) {
    const msgs = {
      'auth/user-not-found':        'No account found with this email address.',
      'auth/wrong-password':        'Incorrect password. Please try again.',
      'auth/invalid-email':         'Please enter a valid email address.',
      'auth/invalid-credential':    'Incorrect email or password.',
      'auth/too-many-requests':     'Too many failed attempts. Please wait a few minutes.',
      'auth/network-request-failed':'Network error — please check your connection.',
    };
    showError(msgs[err.code] || 'Login failed. Please check your credentials.');
  }

  btn.disabled    = false;
  btn.textContent = 'Login →';
};

// ── FORGOT PASSWORD ──
window.doForgotPassword = async function() {
  const email = document.getElementById('loginEmail').value.trim();
  clearMessages();

  if(!email) {
    showError('Please enter your email address above, then click "Forgot password?"');
    return;
  }

  const btn = document.querySelector('.forgot-link');
  btn.textContent = 'Sending…';
  btn.disabled    = true;

  try {
    await sendPasswordResetEmail(auth, email);
    showSuccess(`Reset email sent to ${email} — check your inbox (and spam folder).`);
  } catch(err) {
    const msgs = {
      'auth/user-not-found': 'No account found with this email address.',
      'auth/invalid-email':  'Please enter a valid email address.',
      'auth/too-many-requests': 'Too many requests. Please wait before trying again.',
    };
    showError(msgs[err.code] || 'Could not send reset email. Please try again.');
  }

  btn.textContent = 'Forgot password?';
  btn.disabled    = false;
};

// ── HELPERS ──
function showError(msg) {
  const el = document.getElementById('msgError');
  el.textContent   = msg;
  el.style.display = 'block';
}
function showSuccess(msg) {
  const el = document.getElementById('msgSuccess');
  el.textContent   = msg;
  el.style.display = 'block';
}
function clearMessages() {
  document.getElementById('msgError').style.display   = 'none';
  document.getElementById('msgSuccess').style.display = 'none';
}

// Set default on load
selectRole('manager');
</script>
</body>
</html>
