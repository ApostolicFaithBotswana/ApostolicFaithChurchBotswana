<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Announcements — Camp Meeting 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="camp-shared.css"/>
<style>

/* ── FILTER BAR ── */
.filter-bar {
  display: flex;
  gap: .5rem;
  margin-bottom: 2rem;
  overflow-x: auto;
  scrollbar-width: none;
  padding-bottom: 4px;
  -webkit-overflow-scrolling: touch;
}
.filter-bar::-webkit-scrollbar { display: none; }

.filter-btn {
  display: inline-flex;
  align-items: center;
  gap: .35rem;
  padding: .5rem 1.1rem;
  border-radius: 20px;
  border: 1.5px solid rgba(255,255,255,.12);
  background: transparent;
  color: var(--c-muted);
  font-family: 'Lato', sans-serif;
  font-size: .78rem;
  font-weight: 700;
  cursor: pointer;
  transition: all .2s;
  white-space: nowrap;
  flex-shrink: 0;
}
.filter-btn:hover { border-color: rgba(255,255,255,.25); color: white; }
.filter-btn.active {
  background: rgba(212,175,55,.12);
  border-color: var(--c-gold);
  color: var(--c-gold);
}

.category-pill {
  display: inline-flex;
  align-items: center;
  gap: .3rem;
  font-size: .65rem;
  font-weight: 700;
  padding: .22rem .6rem;
  border-radius: 20px;
  margin-right: .4rem;
  text-transform: uppercase;
  letter-spacing: .06em;
  flex-shrink: 0;
}
.cat-general        { background: rgba(46,204,113,.12);  color: #2ecc71; }
.cat-transportation { background: rgba(99,179,237,.12);  color: #63b3ed; }
.cat-accommodation  { background: rgba(212,175,55,.12);  color: #d4af37; }
.cat-choir          { background: rgba(155,89,182,.12);  color: #a78bfa; }
.cat-kitchen        { background: rgba(230,126,34,.12);  color: #f39c12; }
.cat-workers        { background: rgba(231,76,60,.12);   color: #e74c3c; }

.ann-card {
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.08);
  border-left: 4px solid var(--c-gold);
  border-radius: 14px;
  padding: 1.4rem;
  margin-bottom: 1rem;
  transition: all .25s;
}
.ann-card.general        { border-left-color: #2ecc71; }
.ann-card.transportation { border-left-color: #63b3ed; }
.ann-card.accommodation  { border-left-color: #d4af37; }
.ann-card.choir          { border-left-color: #a78bfa; }
.ann-card.kitchen        { border-left-color: #f39c12; }
.ann-card.workers        { border-left-color: #e74c3c; }
.ann-card:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0,0,0,.3); }

.ann-header {
  display: flex;
  align-items: center;
  gap: .5rem;
  margin-bottom: .6rem;
  flex-wrap: wrap;
}
.ann-title { font-weight: 800; font-size: .98rem; color: white; }
.ann-body  { font-size: .88rem; color: rgba(255,255,255,.72); line-height: 1.65; }
.ann-time  {
  display: inline-flex;
  align-items: center;
  gap: .35rem;
  font-size: .7rem;
  color: var(--c-muted);
  margin-top: .65rem;
}

@media (max-width: 600px) {
  .ann-card  { padding: 1.1rem; }
  .ann-title { font-size: .92rem; }
  .ann-body  { font-size: .85rem; }
}

</style>
</head>
<body>

<header class="camp-nav">
  <div class="camp-nav-inner">
    <a href="index.html" class="camp-nav-brand">
      <img src="../css/images/logo1.png" class="camp-nav-logo" alt="AFC"/>
      <div>
        <span class="camp-nav-title">Camp Meeting 2026</span>
        <span class="camp-nav-sub">AFC Botswana</span>
      </div>
    </a>
    <nav class="camp-nav-links">
      <a href="index.html">Home</a>
      <a href="registration.html">Register</a>
      <a href="schedule.html">Schedule</a>
      <a href="store.html">Store</a>
      <a href="announcements.html" class="active">Announcements</a>
      <a href="testimonies.html">Testimonies</a>
    </nav>
    <button class="camp-hamburger" id="hamburger">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>

<div class="camp-mobile-nav" id="mobileNav">
  <a href="index.html">Home</a>
  <a href="registration.html">Register</a>
  <a href="schedule.html">Schedule</a>
  <a href="store.html">Store</a>
  <a href="announcements.html" class="active">Announcements</a>
  <a href="testimonies.html">Testimonies</a>
  <a href="../index.html">← Main Site</a>
</div>

<div class="camp-page-hero">
  <span class="camp-eyebrow">Camp Meeting 2026</span>
  <h1 class="camp-page-title"><span data-camp-icon="megaphone" data-icon-size="34"></span> <em>Announcements</em></h1>
  <p class="camp-page-sub">Latest updates from the camp management team</p>
</div>

<section class="camp-section">
  <div class="camp-container" style="max-width:760px;">
    <div class="filter-bar">
      <button class="filter-btn active" onclick="filterAnn('all',this)"><span data-camp-icon="layoutGrid" data-icon-size="14"></span> All</button>
      <button class="filter-btn" onclick="filterAnn('general',this)"><span data-camp-icon="circle" data-icon-size="14"></span> General</button>
      <button class="filter-btn" onclick="filterAnn('transportation',this)"><span data-camp-icon="bus" data-icon-size="14"></span> Transport</button>
      <button class="filter-btn" onclick="filterAnn('accommodation',this)"><span data-camp-icon="tent" data-icon-size="14"></span> Accommodation</button>
      <button class="filter-btn" onclick="filterAnn('choir',this)"><span data-camp-icon="music" data-icon-size="14"></span> Choir</button>
      <button class="filter-btn" onclick="filterAnn('kitchen',this)"><span data-camp-icon="utensils" data-icon-size="14"></span> Kitchen</button>
      <button class="filter-btn" onclick="filterAnn('workers',this)"><span data-camp-icon="settings" data-icon-size="14"></span> Workers</button>
    </div>

    <div id="annList">
      <div class="camp-empty">
        <div class="camp-empty-icon" data-camp-icon="megaphone" data-icon-size="28"></div>
        Loading announcements…
      </div>
    </div>
  </div>
</section>

<footer class="camp-footer"></footer>

<script type="module">
import {
  db,
  collection, query, orderBy,
  onSnapshot,
  CAMP_ANN
} from './camp-firebase.js';
import { campIcon, hydrateCampIcons } from './camp-icons.js';
import { initCampShell } from './camp-shell.js';

initCampShell();
hydrateCampIcons();

document.getElementById('hamburger').onclick = () =>
  document.getElementById('mobileNav').classList.toggle('open');

const CAT = {
  general:        { icon: 'circle',   label: 'General',        cls: 'cat-general' },
  transportation: { icon: 'bus',      label: 'Transportation', cls: 'cat-transportation' },
  accommodation:  { icon: 'tent',     label: 'Accommodation',  cls: 'cat-accommodation' },
  choir:          { icon: 'music',    label: 'Choir',          cls: 'cat-choir' },
  kitchen:        { icon: 'utensils', label: 'Kitchen',        cls: 'cat-kitchen' },
  workers:        { icon: 'settings', label: 'Workers',        cls: 'cat-workers' },
};

function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function fmtTime(val){
  if(!val) return '';
  if(val.toDate) return val.toDate().toLocaleString('en-BW',{
    day:'2-digit', month:'short', year:'numeric',
    hour:'2-digit', minute:'2-digit'
  });
  return String(val);
}

let allAnn = [];
let activeFilter = 'all';

function render(){
  const el = document.getElementById('annList');
  const list = activeFilter === 'all'
    ? allAnn
    : allAnn.filter(a => (a.priority || 'general') === activeFilter);

  if(!list.length){
    el.innerHTML = `
      <div class="camp-empty">
        <div class="camp-empty-icon">${campIcon('megaphone', { size: 28 })}</div>
        ${activeFilter === 'all'
          ? 'No announcements yet. Check back soon.'
          : 'No announcements in this category yet.'}
      </div>`;
    return;
  }

  el.innerHTML = list.map(a => {
    const cat = CAT[a.priority] || CAT.general;
    const time = fmtTime(a.createdAt) || fmtTime(a.timestamp);
    return `
      <div class="ann-card ${a.priority || 'general'}">
        <div class="ann-header">
          <span class="category-pill ${cat.cls}">${campIcon(cat.icon, { size: 13 })} ${cat.label}</span>
          <div class="ann-title">${esc(a.title)}</div>
        </div>
        <div class="ann-body">${esc(a.body || '').replace(/\n/g,'<br>')}</div>
        ${time ? `<div class="ann-time">${campIcon('calendar', { size: 13 })} ${time} · Camp Management</div>` : ''}
      </div>`;
  }).join('');
}

window.filterAnn = function(filter, btn){
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = filter;
  render();
};

onSnapshot(
  query(collection(db, CAMP_ANN), orderBy('timestamp','desc')),
  snap => {
    allAnn = snap.docs.map(d => d.data());
    render();
  },
  err => {
    console.error('Announcements error:', err);
    document.getElementById('annList').innerHTML = `
      <div class="camp-empty">
        <div class="camp-empty-icon">${campIcon('alertTriangle', { size: 28 })}</div>
        Could not load announcements. Please check your connection and try again.
      </div>`;
  }
);
</script>
</body>
</html>
